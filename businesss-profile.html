<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main center" style="padding: 30px; min-height: 100vh; background: transparent;">
    <div class="card" style="max-width: 560px; width: 100%;">
      <div style="margin-bottom: 24px;">
        <h1 style="font-size: 2rem; margin-bottom: 10px; color: #38bdf8;">Business Profile</h1>
        <p style="color: #94a3b8; line-height: 1.6;">Update your company details for invoices and customer communications.</p>
      </div>

      <div style="margin-bottom: 20px;">
        <label for="logoFile" style="display: block; margin-bottom: 10px; color: #cbd5e1; font-size: 0.95rem;">Business Logo</label>
        <input type="file" id="logoFile" accept="image/*" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #1f2937; background: #0f172a; color: #e5e7eb;" />
      </div>

      <div style="display: grid; gap: 14px;">
        <input type="text" id="businessName" placeholder="Business Name">
        <input type="text" id="phone" placeholder="Phone">
        <input type="text" id="address" placeholder="Address">
      </div>

      <button class="btn-primary" onclick="saveBusinessProfile()" style="margin-top: 20px;">Save Profile</button>
    </div>
  </div>

  <script type="module" src="profile.js"></script>
</body>
</html>
